<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">Abstract science and computing illustration</title>
  <desc id="desc">A layered abstract illustration with blue and teal gradients, orbiting shapes, and a stylized DNA curve.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="55%" stop-color="#ecfeff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1200" height="640" rx="40" fill="url(#bg)"/>
  <circle cx="980" cy="130" r="120" fill="#dbeafe" opacity="0.8"/>
  <circle cx="210" cy="520" r="150" fill="#ccfbf1" opacity="0.75"/>
  <circle cx="1040" cy="500" r="60" fill="#bfdbfe" opacity="0.9"/>
  <g filter="url(#shadow)">
    <rect x="130" y="110" width="940" height="420" rx="34" fill="#ffffff" opacity="0.82"/>
  </g>
  <g transform="translate(190 150)">
    <rect x="0" y="0" width="420" height="280" rx="28" fill="#0f172a" opacity="0.95"/>
    <rect x="28" y="28" width="364" height="224" rx="20" fill="#111827"/>
    <path d="M62 70 C120 30, 160 30, 218 70 S316 110, 374 70" fill="none" stroke="url(#accent)" stroke-width="10" stroke-linecap="round"/>
    <path d="M62 118 C120 78, 160 78, 218 118 S316 158, 374 118" fill="none" stroke="#60a5fa" stroke-width="10" stroke-linecap="round" opacity="0.95"/>
    <path d="M62 166 C120 126, 160 126, 218 166 S316 206, 374 166" fill="none" stroke="#2dd4bf" stroke-width="10" stroke-linecap="round" opacity="0.95"/>
    <circle cx="102" cy="70" r="12" fill="#f8fafc"/>
    <circle cx="184" cy="118" r="12" fill="#f8fafc"/>
    <circle cx="266" cy="166" r="12" fill="#f8fafc"/>
    <circle cx="348" cy="214" r="12" fill="#f8fafc"/>
    <text x="34" y="246" fill="#cbd5e1" font-family="monospace" font-size="22">biology + computation</text>
  </g>
  <g transform="translate(670 154)">
    <circle cx="130" cy="118" r="94" fill="#dbeafe"/>
    <circle cx="130" cy="118" r="66" fill="#ecfeff"/>
    <path d="M130 24 C180 58, 180 178, 130 212 C80 178, 80 58, 130 24Z" fill="none" stroke="url(#accent)" stroke-width="8"/>
    <path d="M58 118 C92 70, 168 70, 202 118 C168 166, 92 166, 58 118Z" fill="none" stroke="#14b8a6" stroke-width="8"/>
    <circle cx="130" cy="118" r="18" fill="#2563eb"/>
    <g fill="#0f172a" opacity="0.12">
      <circle cx="36" cy="28" r="8"/>
      <circle cx="250" cy="44" r="8"/>
      <circle cx="14" cy="188" r="8"/>
      <circle cx="252" cy="206" r="8"/>
    </g>
    <path d="M42 224 C80 188, 112 188, 150 224 S220 260, 258 224" fill="none" stroke="#93c5fd" stroke-width="10" stroke-linecap="round"/>
  </g>
  <g opacity="0.55" fill="#0f172a">
    <rect x="196" y="448" width="120" height="14" rx="7"/>
    <rect x="330" y="448" width="180" height="14" rx="7"/>
    <rect x="534" y="448" width="92" height="14" rx="7"/>
  </g>
</svg>
